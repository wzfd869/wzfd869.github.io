}
.box{
	position: absolute;
	height: 500px;
	width: 400px;
	right: 50px;
	border-radius: 5px;
	z-index: 1;
	background-position: center top;
    background-size: cover;
	overflow: hidden;
}
.box::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
	background-image: url(https://www.retiehe.com/backend/bing/1080p);
    -webkit-filter: blur(20px);
    -moz-filter: blur(20px);
    -ms-filter: blur(20px);
    -o-filter: blur(20px);
    filter: blur(20px);
	z-index: -1;
    background-color: rgba(255,255,255,0.8);
    background-position: center top;
    background-size: cover;
    background-attachment: fixed;
	margin: -30px;

}
